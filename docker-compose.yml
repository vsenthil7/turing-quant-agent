# turing-quant-agent — single-container deploy on atrio-demo.
# Host port 8097 -> container 80 (nginx). 8097 is the next free slot after
# agentfoundry=8096 in the 809x web band. Mock mode by default.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: turing-quant-agent:latest
    container_name: turing-quant-agent
    restart: unless-stopped
    ports:
      - "8097:80"
    environment:
      TQA_MODE: "${TQA_MODE:-mock}"
      AGENT_PORT: "8000"
      WEB_PORT: "3000"
      NEXT_PUBLIC_API_URL: "/api"
      # --- live config (only used when TQA_MODE / per-adapter mode = live) ---
      # TQA_CHAIN_MODE: "live"
      # MANTLE_RPC_URL: "${MANTLE_RPC_URL:-}"
      # DECISION_LOG_ADDRESS: "${DECISION_LOG_ADDRESS:-}"
      # VAULT_ADDRESS: "${VAULT_ADDRESS:-}"
      # DEPLOYER_PRIVATE_KEY: "${DEPLOYER_PRIVATE_KEY:-}"
      # LLM_API_URL: "${LLM_API_URL:-}"
      # LLM_API_KEY: "${LLM_API_KEY:-}"
      # IPFS_API_URL: "${IPFS_API_URL:-}"
      # IPFS_GATEWAY_URL: "${IPFS_GATEWAY_URL:-}"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
