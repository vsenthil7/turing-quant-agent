# nginx front for turing-quant-agent (single container).
#   /        -> Next.js standalone server (WEB_PORT)
#   /api/... -> agent node server (AGENT_PORT), /api prefix stripped
# Ports are templated by entrypoint.sh from env (WEB_PORT, AGENT_PORT).
server {
    listen 80 default_server;
    server_name _;

    # Agent API: strip the /api prefix, forward to the node server.
    location /api/ {
        proxy_pass http://127.0.0.1:__AGENT_PORT__/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: the Next.js app.
    location / {
        proxy_pass http://127.0.0.1:__WEB_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
